  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meal_registry}
      POSTGRES_USER: ${POSTGRES_USER:-meal_registry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meal_registry}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

